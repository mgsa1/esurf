<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>esurf — wave visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A1A;
      color: #C8C8E8;
    }

    body {
      display: flex;
      flex-direction: row;
    }

    /* ---- Left sidebar ---- */
    #controls-panel {
      width: 280px;
      min-width: 280px;
      max-width: 280px;
      height: 100vh;
      overflow-y: auto;
      background: #10101E;
      border-right: 1px solid #2A2A4A;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* Scrollbar styling */
    #controls-panel::-webkit-scrollbar { width: 4px; }
    #controls-panel::-webkit-scrollbar-track { background: #10101E; }
    #controls-panel::-webkit-scrollbar-thumb { background: #2A2A4A; border-radius: 2px; }

    /* Panel header */
    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 12px;
      border-bottom: 1px solid #2A2A4A;
      flex-shrink: 0;
    }

    #panel-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: #C8C8E8;
      line-height: 1.4;
    }

    #play-link {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #00FFCC;
      text-decoration: none;
      white-space: nowrap;
    }
    #play-link:hover { text-decoration: underline; }

    /* slider range input global style */
    input[type="range"] {
      height: 14px;
    }

    /* details/summary reset */
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    /* ---- Three.js canvas ---- */
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Loading / error overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #00FFCC;
      pointer-events: none;
      background: #0A0A1A;
    }

    /* Time-scale panel — floating on the right edge of the canvas */
    #time-panel {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(16, 16, 30, 0.85);
      border: 1px solid #2A2A4A;
      border-radius: 6px;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 10;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="controls-panel">
    <div id="panel-header">
      <span id="panel-title">esurf</span>
      <a id="play-link" href="/">Play Game →</a>
    </div>
    <!-- Preset buttons and slider groups injected by uiControls.ts -->
  </div>

  <div id="canvas-container">
    <canvas id="three-canvas"></canvas>
    <div id="loading-overlay">INITIALIZING...</div>
    <div id="time-panel">
      <!-- populated by initTimeControl() in main.ts -->
    </div>
  </div>

  <script type="module" src="/src/visualizer/main.ts"></script>
</body>
</html>
